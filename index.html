<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VueJS Artikel - Pemrograman Web 2</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- VueJS 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Axios CDN -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <!-- Vue Router CDN (Modul 12) -->
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
</head>
<body>
    <div id="app">
        <div id="container">
            <header>
                <h1>Layout Sederhana (VueJS SPA)</h1>
            </header>
            <nav>
                <router-link to="/" active-class="active">Home</router-link>
                <router-link to="/artikel" active-class="active">Artikel</router-link>
                <router-link to="/about" active-class="active">About</router-link>
                <router-link v-if="!isLoggedIn" to="/login" active-class="active" style="float:right;">Login</router-link>
                <a v-else href="#" @click.prevent="logout" style="float:right;">Logout</a>
            </nav>
            <section id="wrapper">
                <section id="main">
                    <!-- Router View (Konten Utama yang berubah-ubah) -->
                    <router-view></router-view>
                </section>
                <aside id="sidebar">
                    <div class="widget-box">
                        <h3 class="title">Widget Header</h3>
                        <ul>
                            <li><a href="#">Widget Link</a></li>
                            <li><a href="#">Widget Link</a></li>
                        </ul>
                    </div>
                    <div class="widget-box">
                        <h3 class="title">Widget Text</h3>
                        <p>Vestibulum lorem elit, iaculis in nisl volutpat, malesuada tincidunt arcu.</p>
                    </div>
                </aside>
            </section>
            <footer>
                <p>&copy; 2026 - Universitas Pelita Bangsa</p>
            </footer>
        </div>
    </div>

    <!-- Script Komponen -->
    <script src="assets/js/components/Home.js"></script>
    <script src="assets/js/components/ArtikelList.js"></script>
    <script src="assets/js/components/ArtikelForm.js"></script>
    <script src="assets/js/components/About.js"></script>
    <script src="assets/js/components/Login.js"></script>

    <!-- Entry Point Aplikasi -->
    <script src="assets/js/app.js"></script>
</body>
</html>
